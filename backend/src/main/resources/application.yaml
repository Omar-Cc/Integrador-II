spring:
  application:
    name: marweld
  config:
    import: optional:file:.env[.properties]
  # Default database configuration mapping to typical environment variables
  datasource:
    url: jdbc:postgresql://${SUPABASE_HOST}:${SUPABASE_PORT}/${SUPABASE_DB}?sslmode=require
    username: ${SUPABASE_USER}
    password: ${SUPABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED}

app:
  notifications:
    email:
      provider: ${APP_EMAIL_PROVIDER}
  security:
    jwt:
      # Optional: set RSA PEM keys. If empty, the app will generate keys dynamically in memory.
      private-key: ${JWT_PRIVATE_KEY:}
      public-key: ${JWT_PUBLIC_KEY:}
      expiration-ms: ${JWT_EXPIRATION_MS} # 1 hour
      issuer: ${JWT_ISSUER}
    mfa:
      # Base64 de 32 bytes para cifrar secretos TOTP con AES-GCM.
      totp-secret-encryption-key: ${MFA_TOTP_SECRET_ENCRYPTION_KEY:}
    refresh-token:
      ttl-days: ${REFRESH_TOKEN_TTL_DAYS:30}
      secure: ${REFRESH_TOKEN_COOKIE_SECURE:false}
  resend:
    api-key: ${RESEND_API_KEY}
    from-email: ${RESEND_FROM_EMAIL}
  storage:
    cloudflare:
      bucket-name: ${CF_R2_BUCKET:marweld-r2-bucket}
      endpoint: ${CF_R2_ENDPOINT:https://mock-account-id.r2.cloudflarestorage.com}
      access-key: ${CF_R2_ACCESS_KEY:mock-access-key}
      secret-key: ${CF_R2_SECRET_KEY:mock-secret-key}
      public-url-prefix: ${CF_R2_PUBLIC_URL_PREFIX:}
      signed-url-ttl-seconds: ${CF_R2_SIGNED_URL_TTL_SECONDS:900}
  chatbot:
    llm:
      provider: ${APP_CHATBOT_LLM_PROVIDER:MOCK}
    chatbot:
      llm:
        provider: ${APP_CHATBOT_LLM_PROVIDER:MOCK}
        openai:
          api-key: ${OPENAI_API_KEY:}
          model: ${OPENAI_MODEL:gpt-4o-mini}
          temperature: 0.1
        gemini:
          api-key: ${GEMINI_API_KEY:}
          model: ${GEMINI_MODEL:gemini-1.5-flash}
          temperature: 0.1
